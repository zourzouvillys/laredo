services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: laredo
      POSTGRES_USER: laredo
      POSTGRES_PASSWORD: laredo
    command: >
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
    ports:
      - "5432:5432"
    volumes:
      - ./test/e2e/testdata/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laredo"]
      interval: 2s
      timeout: 5s
      retries: 5

  laredo-server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LAREDO_CONFIG: /etc/laredo/laredo.conf
    volumes:
      - ./test/e2e/testdata:/etc/laredo:ro
    ports:
      - "4001:4001"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "laredo-server", "healthcheck"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 5

sources {
  pg {
    type = postgresql
    connection = "postgresql://laredo:laredo@postgres:5432/laredo?sslmode=disable"
    slot_mode = ephemeral
    slot_name = docker_compose_slot
  }
}

tables = [
  {
    source = pg
    schema = public
    table = test_users
    targets = [
      {
        type = indexed-memory
        lookup_fields = [name]
      }
    ]
  }
]

grpc {
  port = 4001
}

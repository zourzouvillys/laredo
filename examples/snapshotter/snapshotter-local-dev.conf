# laredo-snapshotter — minimal local development config.
#
# Subscribes to a local fan-out server and writes JSONL snapshots + diffs to a
# local directory. No AWS, no events. Good for trying the writer end to end.

snapshotter {
  source {
    server = "localhost:4001"
    schema = public
    table  = test_users
  }

  diff     { interval = 5s }
  snapshot { min_interval = 30s, max_interval = 10m, max_churn_records = 1000 }

  destinations = [
    { type = local, path = "./.laredo-archive" }
  ]

  formats {
    snapshot = [ jsonl ]
    diff     = [ jsonl ]
  }

  http { port = 8080 }
}

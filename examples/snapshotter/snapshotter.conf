# laredo-snapshotter — full, commented example configuration.
#
# Materializes a single fan-out table into durable base snapshots + diffs on
# pluggable destinations, in pluggable formats, with optional change events.
#
# See: docs/edr/0001-snapshot-writer.md
#      website/docs/design/snapshot-writer.md
#
# Loaded with the standard laredo config conventions: this file, then
# /etc/laredo/conf.d/*.conf, then environment variables
# (e.g. LAREDO_SNAPSHOTTER_SOURCE_SERVER), then --set key=value overrides.

snapshotter {

  # ---- Source: which fan-out table to subscribe to -----------------------
  source {
    server    = "laredo-server:4001"   # the load-balanced fan-out address
    schema    = public
    table     = config_document
    client_id = snapshotter-config-1    # stable ID for monitoring/failover
    # Optional: persist the client's local state for fast restarts.
    local_snapshot_path = "/var/lib/laredo/snapshotter/cfg-cache.json"
  }

  # ---- Diff cadence -------------------------------------------------------
  diff {
    interval = 30s        # flush buffered changes to a diff artifact this often
  }

  # ---- Re-base (snapshot) thresholds -------------------------------------
  # A diff is written each interval UNLESS one of these fires, in which case a
  # fresh base snapshot is written instead. Omit a key to disable that trigger.
  snapshot {
    min_interval       = 5m         # never re-base more often than this (floor)
    max_interval       = 6h         # always re-base at least this often (ceiling)
    max_diff_bytes     = 33554432   # 32 MiB: serialized diff this big -> snapshot
    max_diff_fraction  = 0.25       # ...or 25% of the last snapshot's byte size
    max_churn_records  = 100000     # ...or this many changed rows since snapshot
    max_churn_fraction = 0.5        # ...or 50% of the current dataset row count
  }

  # ---- Destinations: artifact bytes + the manifest land here -------------
  # Multiple destinations are allowed; an artifact is durable only once written
  # to ALL of them. Each AWS-backed destination names a credentials profile.
  destinations = [
    {
      type        = s3
      bucket      = my-laredo-archive
      prefix      = "config_document/"
      region      = us-east-1
      credentials = s3_writer
    },
    {
      type = local
      path = "/var/lib/laredo/snapshotter/archive"
    }
  ]

  # ---- Formats: snapshots and diffs may differ; multiple are allowed -----
  formats {
    snapshot = [ jsonl, protobuf ]   # emit both; each is a separate object
    diff     = [ protobuf ]          # diffs only as protobuf here
  }

  # ---- Change events: advisory, at-least-once notifications --------------
  events = [
    {
      type        = sns
      topic_arn   = "arn:aws:sns:us-east-1:111122223333:laredo-config-document"
      credentials = events_pub
    },
    {
      type        = kinesis
      stream      = laredo-config-document
      region      = us-east-1
      credentials = events_pub
    }
    # { type = sqs, queue_url = "https://sqs.us-east-1.amazonaws.com/111/laredo-cfg", credentials = events_pub }
  ]

  # ---- AWS credentials: resolved per action group ------------------------
  # Define named profiles; each AWS-backed component above references one.
  credentials {
    # Ambient: the aws-sdk-go-v2 default chain (env vars, web identity / IRSA,
    # EC2/ECS task role). Nothing else to configure.
    s3_writer {
      type = ambient
    }

    # Assume-role: layer a role on top of the ambient base identity. Use for
    # cross-account writes (e.g. events published into another account).
    events_pub {
      type         = assume_role
      role_arn     = "arn:aws:iam::444455556666:role/laredo-events-publisher"
      external_id  = "laredo"                 # optional, if the trust policy requires it
      session_name = "laredo-snapshotter"     # optional
      # base = s3_writer                        # optional: which profile provides the base creds
    }
  }

  # ---- Operational HTTP surface ------------------------------------------
  http {
    port = 8080   # GET /health/live, /health/ready, /metrics, /status; POST /snapshot
  }

  # ---- Retention ----------------------------------------------------------
  retention {
    # Keep artifacts back to (and including) the newest snapshot they precede.
    # 'keep_epochs' retains this many full base+diff generations before pruning.
    keep_epochs = 2
  }
}
